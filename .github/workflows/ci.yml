name: Universal AI Connector CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  hygiene:
    name: Repository hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out sources
        uses: actions/checkout@v7

      - name: Run secret and whitespace checks
        run: ./scripts/check.sh --hygiene

  apple-poc:
    name: Apple interoperability POC
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Check out sources
        uses: actions/checkout@v7

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Report toolchain versions
        run: |
          java -version
          xcodebuild -version

      - name: Run complete POC verification
        env:
          UAC_SWIFT_RESULT_BUNDLE_PATH: ${{ runner.temp }}/uac-swift-package.xcresult
        run: ./scripts/check.sh --full

      - name: Upload failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: apple-poc-failure-evidence
          path: |
            ${{ runner.temp }}/uac-swift-package.xcresult
            bridge/build/reports/tests/
          if-no-files-found: ignore
          retention-days: 7

  required-checks:
    name: Required checks
    if: always()
    runs-on: ubuntu-latest
    needs:
      - hygiene
      - apple-poc
    steps:
      - name: Confirm required jobs passed
        env:
          HYGIENE_RESULT: ${{ needs.hygiene.result }}
          APPLE_POC_RESULT: ${{ needs.apple-poc.result }}
        run: |
          if [[ "$HYGIENE_RESULT" != "success" || "$APPLE_POC_RESULT" != "success" ]]; then
            echo "Required checks did not pass."
            echo "hygiene=$HYGIENE_RESULT"
            echo "apple-poc=$APPLE_POC_RESULT"
            exit 1
          fi

          echo "All required Universal AI Connector checks passed."
