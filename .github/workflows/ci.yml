name: Universal AI Connector CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  hygiene:
    name: Repository hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out sources
        uses: actions/checkout@v7

      - name: Run repository hygiene and script tests
        run: |
          ./scripts/check.sh --hygiene
          ./scripts/tests/run-android-sample-test.sh

  jvm-android-linux:
    name: JVM + Android (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out sources
        uses: actions/checkout@v7

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: platform-tools platforms;android-36 build-tools;36.1.0

      - name: Run JVM and Android checks
        run: >-
          ./gradlew
          :bridge:jvmTest
          :bridge:testAndroidHostTest
          :bridge:bundleAndroidMainAar
          :samples:jvm-console:consumerCheck
          :samples:android:consumerCheck
          --stacktrace

      - name: Upload failure evidence
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: linux-jvm-android-failure-evidence
          path: |
            bridge/build/reports/tests/
            samples/jvm-console/build/reports/tests/
            samples/android/build/reports/tests/
          if-no-files-found: ignore
          retention-days: 7

  jvm-windows:
    name: JVM (Windows)
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Check out sources
        uses: actions/checkout@v7

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Run JVM checks
        run: ./gradlew.bat :bridge:jvmTest :samples:jvm-console:consumerCheck --stacktrace

      - name: Upload failure evidence
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: windows-jvm-failure-evidence
          path: |
            bridge/build/reports/tests/
            samples/jvm-console/build/reports/tests/
          if-no-files-found: ignore
          retention-days: 7

  apple-poc:
    name: Apple POC + JVM (macOS)
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Check out sources
        uses: actions/checkout@v7

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: platform-tools platforms;android-36 build-tools;36.1.0

      - name: Report toolchain versions
        run: |
          java -version
          xcodebuild -version

      - name: Run JVM checks
        run: ./gradlew :bridge:jvmTest :samples:jvm-console:consumerCheck --stacktrace

      - name: Run complete POC verification
        env:
          UAC_SWIFT_RESULT_BUNDLE_PATH: ${{ runner.temp }}/uac-swift-package.xcresult
        run: ./scripts/check.sh --full

      - name: Upload failure evidence
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: apple-poc-failure-evidence
          path: |
            ${{ runner.temp }}/uac-swift-package.xcresult
            bridge/build/reports/tests/
            samples/jvm-console/build/reports/tests/
            samples/android/build/reports/tests/
          if-no-files-found: ignore
          retention-days: 7

  required-checks:
    name: Required checks
    if: always()
    runs-on: ubuntu-latest
    needs:
      - hygiene
      - jvm-android-linux
      - jvm-windows
      - apple-poc
    steps:
      - name: Confirm required jobs passed
        env:
          HYGIENE_RESULT: ${{ needs.hygiene.result }}
          JVM_ANDROID_LINUX_RESULT: ${{ needs.jvm-android-linux.result }}
          JVM_WINDOWS_RESULT: ${{ needs.jvm-windows.result }}
          APPLE_POC_RESULT: ${{ needs.apple-poc.result }}
        run: |
          if [[ "$HYGIENE_RESULT" != "success" ||
                "$JVM_ANDROID_LINUX_RESULT" != "success" ||
                "$JVM_WINDOWS_RESULT" != "success" ||
                "$APPLE_POC_RESULT" != "success" ]]; then
            echo "Required checks did not pass."
            echo "hygiene=$HYGIENE_RESULT"
            echo "jvm-android-linux=$JVM_ANDROID_LINUX_RESULT"
            echo "jvm-windows=$JVM_WINDOWS_RESULT"
            echo "apple-poc=$APPLE_POC_RESULT"
            exit 1
          fi

          echo "All required Universal AI Connector checks passed."
